name: Windows Server Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action for the Windows server lane
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read

concurrency:
  group: terraform-windows-server
  cancel-in-progress: false

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

jobs:
  windows-server:
    name: Windows Server Plan or Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan Windows Server
        run: |
          terraform plan \
            -input=false \
            -target=module.vm_dev_jpe_win_001 \
            -target=module.winrm_extension_dev_jpe_win_001 \
            -out=windows-server.tfplan

      - name: Terraform Apply Windows Server
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve windows-server.tfplan
